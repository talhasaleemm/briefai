version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - briefai-db:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/briefai.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  briefai-db:
